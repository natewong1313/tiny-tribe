compatibility_date = "2025-10-02"
compatibility_flags = ["nodejs_compat"]
main = "vinext/server/app-router-entry"
name = "cloesce"

[[d1_databases]]
binding = "db"
database_id = "replace_with_db_id"
database_name = "tiny-tribe-db"
